schema_version: 1
rules_version: "2026.07.2"

# Minimum job document-frequency for a candidate keyword to be included.
min_job_count: 5

# Minimum distinct companies for a candidate keyword to be included.
min_company_count: 2

# Maximum keywords to output (top-N by job count).
max_keywords: 80

# ---------------------------------------------------------------------------
# Jieba custom dictionary -- technology terms that the default dictionary may
# not segment correctly. Each entry is added to jieba before segmentation.
# ---------------------------------------------------------------------------
user_dict:
  - 大模型
  - 大语言模型
  - 智能体
  - 微服务
  - 向量数据库
  - 知识图谱
  - 多模态
  - 端到端
  - 零信任
  - 红蓝对抗
  - 蓝军
  - 溯源分析
  - 安全运营中心
  - 威胁情报
  - 安全左移
  - 漏洞挖掘
  - 模糊测试
  - 渗透测试
  - 应急响应
  - 供应链安全
  - 态势感知
  - 数据合规
  - 隐私计算
  - 联邦学习
  - 提示注入
  - 对抗样本
  - 模型安全
  - 推理加速
  - 模型量化
  - 服务网格
  - 云原生
  - 容器编排
  - 边缘计算
  - 数据湖
  - 数据仓库
  - 实时计算
  - 流式计算
  - 特征工程
  - 模型服务
  - 推荐系统

# ---------------------------------------------------------------------------
# Candidate aliases map variant forms to canonical display names.
# Applied before counting to merge equivalent terms. Formal skills and domain
# signals continue to come from market_taxonomy.yaml.
# ---------------------------------------------------------------------------
aliases:
  Redis: [redis]
  MySQL: [mysql]
  PostgreSQL: [postgres, postgresql]
  Elasticsearch: [elastic search, elasticsearch]
  Kafka: [apache kafka, kafka]
  gRPC: [grpc]
  Spark: [apache spark, spark]
  Flink: [apache flink, flink]
  Hadoop: [apache hadoop, hadoop]
  GitOps: [gitops]
  DevOps: [devops]
  云原生: [cloud native, cloud-native]
  Kubernetes: [K8s, k8s, K8S]
  Go: [Golang, golang]
  TypeScript: [typescript]
  JavaScript: [javascript]
  C++: [C/C++, c/c++, Cpp]
  NodeJS: [Node.js, nodejs]

# ---------------------------------------------------------------------------
